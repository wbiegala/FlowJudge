<lib-view-header
  [title]="`${'WORKSPACES.DETAILS.TITLE' | translate} - ${(viewModeKey() | translate).toLowerCase()}`"
  [actions]="actions"
  (headerEvent)="handleActionEvent($event)">

  <lib-form-section [title]="'WORKSPACES.DETAILS.FORMS.BASIC.SECTION_NAME' | translate">

    @if (viewMode() === 'Preview' ) {
      <!-- TODO -->
    }
    @else {

    <form [formGroup]="basicDataForm" ngxsForm="workspace.basicForm" class="basic-data-form">

      <mat-form-field class="full-length-form-field">
        <mat-label>{{ 'WORKSPACES.DETAILS.FORMS.BASIC.FIELDS.NAME' | translate }}</mat-label>
        <input matInput formControlName="name">
        <mat-error libControlError [control]="basicDataForm.controls.name"></mat-error>
      </mat-form-field>

    </form>

    }
  </lib-form-section>

</lib-view-header>
