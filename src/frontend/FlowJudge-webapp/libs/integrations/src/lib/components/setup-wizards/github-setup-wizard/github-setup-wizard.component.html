<lib-view-header [title]="'INTEGRATIONS.SETUP-WIZARD.GITHUB.TITLE' | translate" [actions]="actions">
  @if (isLoading()) {
    <lib-loading></lib-loading>
  } @else {

    <lib-form-section [title]="'INTEGRATIONS.SETUP-WIZARD.GITHUB.FORMS.BASIC.SECTION_NAME' | translate">
      <form [formGroup]="basicDataForm" class="basic-data-form">

        <mat-form-field class="full-length-form-field">
          <mat-label>{{ 'INTEGRATIONS.SETUP-WIZARD.GITHUB.FORMS.BASIC.FIELDS.NAME' | translate }}</mat-label>
          <input matInput formControlName="name">
          <mat-error libControlError [control]="basicDataForm.controls.name"></mat-error>
      </mat-form-field>

      </form>
    </lib-form-section>

    <lib-form-section [title]="'INTEGRATIONS.SETUP-WIZARD.GITHUB.FORMS.REPOSITORIES.SECTION_NAME' | translate">
      @for (repository of repositories(); track $index) {
        <p>{{ repository.id }} | {{ repository.fullName }}</p>
      }
    </lib-form-section>

  }
</lib-view-header>
