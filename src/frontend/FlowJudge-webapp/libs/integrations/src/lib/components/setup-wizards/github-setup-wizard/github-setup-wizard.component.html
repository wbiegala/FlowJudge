<lib-view-header [title]="'INTEGRATIONS.SETUP-WIZARD.GITHUB.TITLE' | translate">
  <mat-stepper linear #stepper>

    <mat-step [stepControl]="basicDataForm">

      <form [formGroup]="basicDataForm" class="basic-data-form">

      <mat-form-field class="full-length-form-field">
        <mat-label>{{ 'INTEGRATIONS.DETAILS.FORMS.BASIC.FIELDS.NAME' | translate }}</mat-label>
        <input matInput formControlName="name">
        <mat-error libControlError [control]="basicDataForm.controls.name"></mat-error>
      </mat-form-field>

      </form>

      <button matButton (click)="onStepOneNextClick(stepper)">{{ 'INTEGRATIONS.SETUP-WIZARD.CONTROLS.BUTTON_NEXT' | translate}}</button>

    </mat-step>


    <mat-step>

      <button matButton (click)="onStepTwoInstallClick()">{{ 'INTEGRATIONS.SETUP-WIZARD.GITHUB.CONNECT_STEP.BUTTON_INSTALL' | translate}}</button>

    </mat-step>


    <mat-step>

    </mat-step>
  </mat-stepper>
</lib-view-header>
